<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mockup Modal v2 — Propuesta con color</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1C1C1C; font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex; gap: 40px; align-items: flex-start; justify-content: center;
  min-height: 100vh; padding: 32px; color: #e8e8e8;
}

:root {
  --surface: #252525; --surface2: #2e2e2e;
  --border: #333; --text: #e8e8e8; --text-sub: #636466;
  --accent: #ED002F;
}

h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #636466; margin-bottom: 16px; text-align: center; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 480px;
  box-shadow: 0 20px 60px #0008;
}

/* ══════════════════════════════
   VERSIÓN ACTUAL
══════════════════════════════ */
.modal-header-actual {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  position: relative;
}
.modal-header-actual::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 7px;
  border-radius: 16px 16px 0 0; background: #636466;
}
.modal-title { font-size: 14px; font-weight: 700; color: var(--text); }
.btn-cerrar { color: var(--text-sub); font-size: 14px; cursor: pointer; }

.modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }

.campo { display: flex; flex-direction: column; gap: 6px; }
.campo label { font-size: 10px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; }
.campo input, .campo select, .campo textarea {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 12px;
  color: var(--text); font-size: 13px; width: 100%;
}
.campo-fila { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.sep { border: none; border-top: 1px solid var(--border); }

.pills-row { display: flex; gap: 5px; flex-wrap: wrap; }
.pill {
  padding: 5px 11px; border-radius: 20px; font-size: 11px; font-weight: 600;
  border: 1px solid var(--border); background: transparent; color: var(--text-sub); cursor: pointer;
}
.pills-block { display: flex; gap: 6px; }
.pill-block {
  flex: 1; padding: 7px; border-radius: 8px; font-size: 11px; font-weight: 700; text-align: center;
  border: 1px solid var(--border); background: transparent; color: var(--text-sub); cursor: pointer;
}
.prog-segs { display: flex; gap: 5px; }
.prog-seg {
  flex: 1; padding: 7px 4px; border-radius: 8px; font-size: 11px; font-weight: 700; text-align: center;
  border: 1px solid var(--border); background: transparent; color: var(--text-sub); cursor: pointer;
}
.modal-footer {
  display: flex; align-items: center; justify-content: flex-end; gap: 8px;
  padding: 14px 20px; border-top: 1px solid var(--border);
}
.btn-p { background: #ED002F; color: #fff; padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-s { background: var(--surface2); border: 1px solid var(--border); color: var(--text-sub); padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.avatares { display: flex; gap: 7px; flex-wrap: wrap; }
.av { width: 32px; height: 32px; border-radius: 50%; font-size: 10px; font-weight: 800; display: flex; align-items: center; justify-content: center; opacity: 0.35; }
.av-none { background: var(--surface2); color: var(--text-sub); font-size: 14px; font-weight: 400; }


/* ══════════════════════════════
   VERSIÓN PROPUESTA
══════════════════════════════ */

/* Header más visual */
.modal-header-new {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
  position: relative; overflow: hidden; border-radius: 16px 16px 0 0;
  background: linear-gradient(135deg, #1a1a2e 0%, #252525 100%);
}
.modal-header-new::after {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, #a78bfa, #3b82f6, #10b981);
}
.new-title-wrap { display: flex; flex-direction: column; gap: 2px; }
.new-title { font-size: 15px; font-weight: 800; color: var(--text); }
.new-sub { font-size: 10px; color: #636466; }

/* Labels con ícono de color */
.campo-new label {
  font-size: 10px; font-weight: 700; color: var(--text-sub);
  text-transform: uppercase; letter-spacing: 0.5px;
  display: flex; align-items: center; gap: 5px;
}
.lbl-dot { width: 6px; height: 6px; border-radius: 50%; }

/* Input con borde izquierdo de color al focus (simulado hover) */
.campo-new input, .campo-new select, .campo-new textarea {
  background: var(--surface2); border: 1px solid var(--border);
  border-left: 3px solid #333;
  border-radius: 8px; padding: 9px 12px;
  color: var(--text); font-size: 13px; width: 100%;
  transition: border-color 0.2s;
}
.campo-new input.focused { border-left-color: #a78bfa; border-color: #a78bfa44; }
.campo-new select.focused { border-left-color: #3b82f6; border-color: #3b82f644; }

/* Pills estado — con color de borde siempre visible */
.pill-new-estado {
  padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.pe-violet  { border: 1px solid #a78bfa50; color: #a78bfa80; background: #a78bfa08; }
.pe-blue    { border: 1px solid #3b82f650; color: #3b82f680; background: #3b82f608; }
.pe-amber   { border: 1px solid #f59e0b50; color: #f59e0b80; background: #f59e0b08; }
.pe-orange  { border: 1px solid #f9731650; color: #f9731680; background: #f9731608; }
.pe-green   { border: 1px solid #10b98150; color: #10b98180; background: #10b98108; }

/* Pills prioridad — con color siempre visible */
.pill-new-prio {
  flex: 1; padding: 8px; border-radius: 8px; font-size: 11px; font-weight: 700; text-align: center;
  cursor: pointer; transition: all 0.15s;
}
.pp-gray   { border: 1px solid #94a3b840; color: #94a3b870; background: #94a3b808; }
.pp-amber  { border: 1px solid #f59e0b50; color: #f59e0b80; background: #f59e0b08; }
.pp-red    { border: 1px solid #ED002F50; color: #ED002F80; background: #ED002F08; }

/* Pills magnitud con color */
.pill-new-mag {
  flex: 1; padding: 8px; border-radius: 8px; font-size: 11px; font-weight: 700; text-align: center;
  cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.pm-green  { border: 1px solid #10b98140; color: #10b98170; background: #10b98108; }
.pm-blue   { border: 1px solid #3b82f640; color: #3b82f670; background: #3b82f608; }
.pm-amber  { border: 1px solid #f59e0b40; color: #f59e0b70; background: #f59e0b08; }
.pm-red    { border: 1px solid #ED002F40; color: #ED002F70; background: #ED002F08; }

/* Pills tipo */
.pill-new-tipo {
  flex: 1; padding: 8px; border-radius: 8px; font-size: 11px; font-weight: 700; text-align: center;
  cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.pt-ind    { border: 1px solid #6366f140; color: #6366f170; background: #6366f108; }
.pt-orange { border: 1px solid #f9731640; color: #f9731670; background: #f9731608; }
.pt-sky    { border: 1px solid #0ea5e940; color: #0ea5e970; background: #0ea5e908; }

/* Progreso con colores */
.prog-seg-new {
  flex: 1; padding: 8px 4px; border-radius: 8px; font-size: 11px; font-weight: 700; text-align: center;
  border: 1px solid var(--border); background: transparent; color: var(--text-sub); cursor: pointer;
  position: relative; overflow: hidden;
}
.prog-seg-new::before {
  content: ''; position: absolute; bottom: 0; left: 0; height: 3px;
  border-radius: 0 0 8px 8px;
}
.ps-0::before   { width: 0%;   background: #636466; }
.ps-25::before  { width: 25%;  background: #f59e0b; }
.ps-50::before  { width: 50%;  background: #f59e0b; }
.ps-75::before  { width: 75%;  background: #10b981; }
.ps-100::before { width: 100%; background: #10b981; }

/* Separador con label */
.sep-label {
  display: flex; align-items: center; gap: 10px; color: #636466; font-size: 9px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
}
.sep-label::before, .sep-label::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

.campo-new { display: flex; flex-direction: column; gap: 6px; }
</style>
</head>
<body>

<!-- ══ ACTUAL ══ -->
<div>
  <h3>Actual</h3>
  <div class="modal">
    <div class="modal-header-actual">
      <h2 class="modal-title">Nuevo trabajo</h2>
      <span class="btn-cerrar">✕</span>
    </div>
    <div class="modal-body">
      <div class="campo">
        <label>Nombre del trabajo *</label>
        <input type="text" placeholder="Ej: Dashboard Comercial" />
      </div>
      <div class="campo-fila">
        <div class="campo">
          <label>Área *</label>
          <select><option>Seleccionar área...</option></select>
        </div>
        <div class="campo">
          <label>Responsable *</label>
          <div class="avatares">
            <div class="av av-none">—</div>
            <div class="av" style="background:#3b82f622;color:#3b82f6">AR</div>
            <div class="av" style="background:#ec489922;color:#ec4899">DN</div>
            <div class="av" style="background:#a78bfa22;color:#a78bfa">KH</div>
            <div class="av" style="background:#f9731622;color:#f97316">MM</div>
            <div class="av" style="background:#84cc1622;color:#84cc16">PM</div>
          </div>
        </div>
      </div>
      <hr class="sep" />
      <div class="campo">
        <label>Estado *</label>
        <div class="pills-row">
          <button class="pill">Por comenzar</button>
          <button class="pill">En gestión</button>
          <button class="pill">En revisión</button>
          <button class="pill">Pendiente</button>
          <button class="pill">Completado</button>
        </div>
      </div>
      <div class="campo">
        <label>Prioridad *</label>
        <div class="pills-block">
          <button class="pill-block">Baja</button>
          <button class="pill-block">Media</button>
          <button class="pill-block">Alta</button>
        </div>
      </div>
      <div class="campo">
        <label>Magnitud</label>
        <div class="pills-block">
          <button class="pill-block">Rápido</button>
          <button class="pill-block">Moderado</button>
          <button class="pill-block">Extenso</button>
          <button class="pill-block">Complejo</button>
        </div>
      </div>
      <div class="campo">
        <label>Tipo</label>
        <div class="pills-block">
          <button class="pill-block">Puntual</button>
          <button class="pill-block">Recurrente</button>
          <button class="pill-block">Iniciativa</button>
        </div>
      </div>
      <div class="campo">
        <label>Progreso *</label>
        <div class="prog-segs">
          <button class="prog-seg">0%</button>
          <button class="prog-seg">25%</button>
          <button class="prog-seg">50%</button>
          <button class="prog-seg">75%</button>
          <button class="prog-seg">100%</button>
        </div>
      </div>
      <div class="campo-fila">
        <div class="campo"><label>Fecha inicio *</label><input type="date" /></div>
        <div class="campo"><label>Fecha SLA *</label><input type="date" /></div>
      </div>
      <div class="campo"><label>Comentarios</label><textarea placeholder="Notas..." rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn-s">Cancelar</button>
      <button class="btn-p">Crear trabajo</button>
    </div>
  </div>
</div>

<!-- ══ PROPUESTA ══ -->
<div>
  <h3>Propuesta</h3>
  <div class="modal">
    <div class="modal-header-new">
      <div class="new-title-wrap">
        <span class="new-title">Nuevo trabajo</span>
        <span class="new-sub">Customer Intelligence · Verisure</span>
      </div>
      <span class="btn-cerrar">✕</span>
    </div>
    <div class="modal-body">

      <!-- Nombre -->
      <div class="campo-new">
        <label><span class="lbl-dot" style="background:#a78bfa"></span> Nombre del trabajo *</label>
        <input type="text" placeholder="Ej: Dashboard Comercial" class="focused" />
      </div>

      <!-- Área + Responsable -->
      <div class="campo-fila">
        <div class="campo-new">
          <label><span class="lbl-dot" style="background:#3b82f6"></span> Área *</label>
          <select class="focused"><option>Seleccionar área...</option></select>
        </div>
        <div class="campo-new">
          <label><span class="lbl-dot" style="background:#f59e0b"></span> Responsable *</label>
          <div class="avatares">
            <div class="av av-none">—</div>
            <div class="av" style="background:#3b82f622;color:#3b82f6">AR</div>
            <div class="av" style="background:#ec489922;color:#ec4899">DN</div>
            <div class="av" style="background:#a78bfa22;color:#a78bfa">KH</div>
            <div class="av" style="background:#f9731622;color:#f97316">MM</div>
            <div class="av" style="background:#84cc1622;color:#84cc16">PM</div>
          </div>
        </div>
      </div>

      <!-- Sep Estado -->
      <div class="sep-label">Estado</div>

      <div class="campo-new">
        <div class="pills-row">
          <button class="pill-new-estado pe-violet">Por comenzar</button>
          <button class="pill-new-estado pe-blue">En gestión</button>
          <button class="pill-new-estado pe-amber">En revisión</button>
          <button class="pill-new-estado pe-orange">Pendiente</button>
          <button class="pill-new-estado pe-green">Completado</button>
        </div>
      </div>

      <!-- Sep Prioridad -->
      <div class="sep-label">Prioridad</div>

      <div class="campo-new">
        <div class="pills-block">
          <button class="pill-new-prio pp-gray">Baja</button>
          <button class="pill-new-prio pp-amber">Media</button>
          <button class="pill-new-prio pp-red">Alta</button>
        </div>
      </div>

      <!-- Sep Detalles -->
      <div class="sep-label">Detalles</div>

      <div class="campo-new">
        <label><span class="lbl-dot" style="background:#10b981"></span> Magnitud</label>
        <div class="pills-block">
          <button class="pill-new-mag pm-green">Rápido</button>
          <button class="pill-new-mag pm-blue">Moderado</button>
          <button class="pill-new-mag pm-amber">Extenso</button>
          <button class="pill-new-mag pm-red">Complejo</button>
        </div>
      </div>

      <div class="campo-new">
        <label><span class="lbl-dot" style="background:#6366f1"></span> Tipo</label>
        <div class="pills-block">
          <button class="pill-new-tipo pt-ind">Puntual</button>
          <button class="pill-new-tipo pt-orange">Recurrente</button>
          <button class="pill-new-tipo pt-sky">Iniciativa</button>
        </div>
      </div>

      <div class="campo-new">
        <label><span class="lbl-dot" style="background:#ED002F"></span> Progreso *</label>
        <div class="prog-segs">
          <button class="prog-seg-new ps-0">0%</button>
          <button class="prog-seg-new ps-25">25%</button>
          <button class="prog-seg-new ps-50">50%</button>
          <button class="prog-seg-new ps-75">75%</button>
          <button class="prog-seg-new ps-100">100%</button>
        </div>
      </div>

      <!-- Fechas -->
      <div class="campo-fila">
        <div class="campo-new"><label><span class="lbl-dot" style="background:#06b6d4"></span> Fecha inicio *</label><input type="date" /></div>
        <div class="campo-new"><label><span class="lbl-dot" style="background:#f97316"></span> Fecha SLA *</label><input type="date" /></div>
      </div>

      <div class="campo-new">
        <label><span class="lbl-dot" style="background:#636466"></span> Comentarios</label>
        <textarea placeholder="Notas adicionales, contexto, links..." rows="2"></textarea>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn-s">Cancelar</button>
      <button class="btn-p">Crear trabajo</button>
    </div>
  </div>
</div>

</body>
</html>
